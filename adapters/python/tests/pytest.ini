[pytest]
testpaths = unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=pyadapter --cov-report=term-missing --cov-report=html
filterwarnings =
    ignore::pytest.PytestCollectionWarning

[coverage:run]
source = pyadapter
omit =
    */tests/*
    */__pycache__/*
    */.pytest_cache/*

[coverage:report]
fail_under = 75
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
